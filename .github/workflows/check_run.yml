name: Check Suite
on:
  check_suite:
    types: [completed]
jobs:
  build:
    name: Check Run Workflow
    runs-on: ubuntu-latest
    steps:
      - env:
          DESCRIPTION: ${{ fromJson(github.event.check_suite) }}
          CONCLUSION: ${{ github.event.check_suite.conclusion  }}
          SHA: ${{ github.event.check_suite.head_sha }}
          STATUS: ${{ github.event.check_suite.status }}
        run: |
          echo DESCRIPTION: $DESCRIPTION
          echo CONCLUSION: $CONCLUSION
          echo SHA: $SHA
          echo STATUS: $STATUS
