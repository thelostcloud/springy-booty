name: Check Run
on:
  check_run:
    types: [completed]
jobs:
  build:
    name: Check Run Workflow
    runs-on: ubuntu-latest
    steps:
      - env:
          NAME: ${{ github.event.check_run.name }}         
          URL: ${{ github.event.check_run.html_url }}                    
          CONCLUSION: ${{ github.event.check_run.conclusion }}
          SHA: ${{ github.event.check_run.head_sha }}
          STATUS: ${{ github.event.check_run.status }}
          CHECK_SUITE_ID: ${{ github.event.check_run.check_suite.id  }}
          CHECK_SUITE_URL: ${{ github.event.check_run.check_suite.url }}
          CHECK_SUITE_CONCLUSION: ${{ github.event.check_run.check_suite.conclusion }}
        run: |
          echo NAME: $NAME
          echo URL: $URL                    
          echo SHA: $SHA
          echo CONCLUSION: $CONCLUSION
          echo STATUS: $STATUS
          echo CHECK_SUITE_ID: $CHECK_SUITE_ID    
          echo CHECK_SUITE_URL: $CHECK_SUITE_URL      
          echo CHECK_SUITE_CONCLUSION: $CHECK_SUITE_CONCLUSION
